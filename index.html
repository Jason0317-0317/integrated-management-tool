<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春不老薪資計算系統</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 步驟 1: 身份選擇 -->
        <div id="step-role" class="step-container active">
            <div class="role-card">
                <h1>春不老薪資計算系統</h1>
                <p class="subtitle">請選擇您的角色登入系統</p>
                
                <div class="button-group">
                    <button class="btn btn-primary" onclick="selectRole('manager')">
                        店長登入
                    </button>
                    <button class="btn btn-secondary" onclick="selectRole('editor')">
                        小編登入
                    </button>
                </div>
            </div>
        </div>

        <!-- 步驟 2: 功能選擇 -->
        <div id="step-feature" class="step-container">
            <div class="feature-card">
                <div class="header">
                    <button class="btn-back" onclick="goBack()">返回</button>
                    <h1 id="feature-title"></h1>
                </div>
                
                <p class="subtitle">請選擇您要使用的功能</p>
                
                <div id="feature-buttons" class="button-group"></div>
            </div>
        </div>

        <!-- 步驟 3: 功能頁面 -->
        <div id="step-function" class="step-container">
            <div class="function-card">
                <div class="header">
                    <button class="btn-back" onclick="goBack()">返回</button>
                    <h1 id="function-title"></h1>
                </div>
                
                <div id="function-content"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
